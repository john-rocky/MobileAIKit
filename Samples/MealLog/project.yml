name: MealLog
options:
  bundleIdPrefix: com.mobileaikit.meallog
  deploymentTarget:
    iOS: "18.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "6.0"
    IPHONEOS_DEPLOYMENT_TARGET: "18.0"
    TARGETED_DEVICE_FAMILY: "1,2"
    ENABLE_USER_SCRIPT_SANDBOXING: NO
packages:
  LocalAIKit:
    path: ../..
targets:
  MealLog:
    type: application
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mobileaikit.meallog.App
        INFOPLIST_FILE: Sources/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        CODE_SIGN_STYLE: Automatic
    dependencies:
      - package: LocalAIKit
        product: AIKit
      - package: LocalAIKit
        product: AIKitCoreMLLLM
      - package: LocalAIKit
        product: AIKitSpeech
