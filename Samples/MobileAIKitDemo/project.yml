name: MobileAIKitDemo
options:
  bundleIdPrefix: com.mobileaikit.demo
  deploymentTarget:
    iOS: "18.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "6.0"
    IPHONEOS_DEPLOYMENT_TARGET: "18.0"
    TARGETED_DEVICE_FAMILY: "1,2"
    ENABLE_USER_SCRIPT_SANDBOXING: NO
packages:
  MobileAIKit:
    path: ../..
targets:
  MobileAIKitDemo:
    type: application
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mobileaikit.demo.MobileAIKitDemo
        INFOPLIST_FILE: Sources/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
    dependencies:
      - package: MobileAIKit
        product: AIKit
      - package: MobileAIKit
        product: AIKitUI
      - package: MobileAIKit
        product: AIKitLlamaCpp
      - package: MobileAIKit
        product: AIKitSpeech
      - package: MobileAIKit
        product: AIKitVision
      - package: MobileAIKit
        product: AIKitIntegration
