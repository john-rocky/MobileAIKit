name: SPM resolve + build

# Catches upstream dependency breakage (version conflicts, transitive
# package graph rot) AND in-repo compile errors under Swift 6 strict
# concurrency the moment either lands, instead of when a consumer tries a
# clean checkout.
#
# Three stages:
#   1. `swift package resolve` — fetches all packages, validates version
#      ranges are satisfiable.
#   2. `swift build --target <target>` for every library target (macOS).
#   3. `xcodebuild -destination 'generic/platform=iOS'` for every library
#      target. iOS strict concurrency is tighter than the macOS equivalent
#      (captures `#if os(iOS)` / `canImport(UIKit|ARKit|CoreNFC|
#      BackgroundTasks|…)` blocks that macOS skips).

on:
  push:
    branches: [main]
    paths:
      - 'Package.swift'
      - 'Sources/**'
      - '.github/workflows/spm-resolve.yml'
  pull_request:
    paths:
      - 'Package.swift'
      - 'Sources/**'
      - '.github/workflows/spm-resolve.yml'
  schedule:
    # Daily so upstream changes on pinned branches/revisions surface quickly.
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  macos:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Show Swift version
        run: swift --version
      - name: Clean resolve (no cache, no Package.resolved)
        run: |
          rm -rf .build .swiftpm Package.resolved
          swift package resolve
      - name: Build every library target (macOS)
        run: |
          for target in AIKit AIKitCoreMLLLM AIKitVision AIKitSpeech AIKitUI AIKitIntegration AIKitAgent; do
            echo "::group::swift build --target $target"
            swift build --target "$target"
            echo "::endgroup::"
          done

  ios:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Show Xcode version
        run: xcodebuild -version
      - name: Build every library target (iOS)
        run: |
          for scheme in AIKit AIKitCoreMLLLM AIKitVision AIKitSpeech AIKitUI AIKitIntegration AIKitAgent; do
            echo "::group::xcodebuild -scheme $scheme -destination 'generic/platform=iOS'"
            xcodebuild \
              -scheme "$scheme" \
              -destination 'generic/platform=iOS' \
              -skipMacroValidation \
              -skipPackagePluginValidation \
              build | tail -60
            echo "::endgroup::"
          done
