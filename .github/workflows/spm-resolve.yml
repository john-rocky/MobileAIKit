name: SPM resolve

# Catches upstream dependency breakage (e.g. a transitive package removing
# its Package.swift, or a version-range conflict between siblings) the moment
# it happens, instead of when a consumer tries a clean checkout.
#
# Two stages, because they catch different classes of breakage:
#   1. `swift package resolve` — fetches all packages, validates version
#      ranges are satisfiable.
#   2. `xcodebuild -resolvePackageDependencies` on Tests/SPMConsumer —
#      runs Xcode's deeper graph validation. Catches constraint conflicts
#      and missing product references that stage 1 silently accepts.
#      Rounds 5 and 6 both slipped past stage 1 and would have been caught
#      here.
#
# Resolve-only — no build, no tests. Device builds live elsewhere.

on:
  push:
    branches: [main]
    paths:
      - 'Package.swift'
      - 'Tests/SPMConsumer/**'
      - '.github/workflows/spm-resolve.yml'
  pull_request:
    paths:
      - 'Package.swift'
      - 'Tests/SPMConsumer/**'
      - '.github/workflows/spm-resolve.yml'
  schedule:
    # Daily so upstream changes on pinned branches/revisions surface quickly.
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  resolve:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Show Swift version
        run: swift --version
      - name: Clean resolve (no cache, no Package.resolved)
        run: |
          rm -rf .build .swiftpm Package.resolved
          swift package resolve
      - name: Consumer-graph resolve (Xcode, catches what stage 1 misses)
        working-directory: Tests/SPMConsumer
        run: |
          rm -rf .build .swiftpm Package.resolved
          xcodebuild -resolvePackageDependencies -packagePath .
